<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SPACE INVADERS AR · Ejes invertidos (natural)</title>
    <style>
        /* (los mismos estilos que antes, los mantengo por brevedad) */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            font-size: 1.5rem;
            font-weight: bold;
        }
        #ui span {
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 50, 50, 0.9);
            box-shadow: 0 0 30px rgba(255,0,0,0.6);
            z-index: 20;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px red;
        }
        #crosshair::before {
            top: 50%;
            left: -20px;
            width: 100px;
            height: 3px;
            transform: translateY(-50%);
        }
        #crosshair::after {
            left: 50%;
            top: -20px;
            width: 3px;
            height: 100px;
            transform: translateX(-50%);
        }
        #shoot-btn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff5e5e, #aa0000);
            border: 4px solid white;
            box-shadow: 0 0 40px #ff0000, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #shoot-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 80px #ff9900;
        }
        #restart {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd966;
            color: #1e1e2f;
            border: none;
            padding: 15px 50px;
            font-size: 1.8rem;
            border-radius: 60px;
            z-index: 100;
            display: none;
            cursor: pointer;
            box-shadow: 0 0 30px #ffd966;
            border: 2px solid white;
        }
        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.85);
            padding: 40px 80px;
            border-radius: 40px;
            z-index: 200;
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            border: 4px solid #ff0000;
            display: none;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ccc;
            background: rgba(20,20,30,0.8);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 15;
            backdrop-filter: blur(4px);
            border: 1px solid #444;
        }
        #orientation-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,20,0.95);
            color: white;
            padding: 30px 40px;
            border-radius: 40px;
            z-index: 1000;
            text-align: center;
            border: 2px solid #0ff;
            backdrop-filter: blur(15px);
            display: none;
        }
        #orientation-prompt button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #0ff;
            border: none;
            border-radius: 60px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <span>❤️ <span id="lives">3</span></span>
        <span>👾 <span id="score">0</span></span>
    </div>
    <div id="crosshair"></div>
    <div id="shoot-btn">🔫</div>
    <div id="gameover">GAME OVER</div>
    <div id="restart">VOLVER A JUGAR</div>
    <div id="status">Inicializando...</div>
    <div id="orientation-prompt">
        <h2>🎯 Activar giroscopio</h2>
        <p>Necesitamos acceso a la orientación para apuntar.</p>
        <button id="request-orientation">PERMITIR</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Escena, cámara, render (sin fondo de cámara real, solo 3D) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); // Azul noche
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Altura de ojos
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Iluminación (igual que antes) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 30;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 50;
        scene.add(sunLight);
        
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-5, 5, -10);
        scene.add(backLight);
        
        const accentLight = new THREE.PointLight(0xffaa00, 0.8, 30);
        accentLight.position.set(0, 5, 5);
        scene.add(accentLight);

        // --- Fondo estrellado ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 80 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starsPositions[i] = r * Math.sin(phi) * Math.cos(theta);
            starsPositions[i+1] = r * Math.sin(phi) * Math.sin(theta);
            starsPositions[i+2] = r * Math.cos(phi);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- Variables del juego ---
        let playerPosition = { lat: 0, lon: 0 };
        let originLat = null;
        let originLon = null;
        let marcianos = [];
        let lives = 3;
        let score = 0;
        let gameActive = true;
        let lastShot = 0;
        const SHOT_COOLDOWN = 300;

        // UI
        const livesSpan = document.getElementById('lives');
        const scoreSpan = document.getElementById('score');
        const gameoverDiv = document.getElementById('gameover');
        const restartBtn = document.getElementById('restart');
        const statusDiv = document.getElementById('status');
        const shootBtn = document.getElementById('shoot-btn');

        // --- Calibración de orientación: ángulos de referencia ---
        let initialBeta = null;
        let initialGamma = null;

        // --- Función para crear marciano (geometría de respaldo detallada) ---
        function createAlien() {
            const group = new THREE.Group();
            
            // Cuerpo (cilindro)
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.0, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x33dd33, emissive: 0x113311, roughness: 0.3, metalness: 0.1 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Cabeza
            const headGeo = new THREE.SphereGeometry(0.4, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x44ee44, emissive: 0x113311 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.1;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Ojos
            const eyeGeo = new THREE.SphereGeometry(0.12, 8);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.2, 1.2, 0.35);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.2, 1.2, 0.35);
            group.add(eyeR);
            
            // Pupilas rojas
            const pupilGeo = new THREE.SphereGeometry(0.06, 6);
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
            pupilL.position.set(-0.2, 1.2, 0.45);
            group.add(pupilL);
            const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
            pupilR.position.set(0.2, 1.2, 0.45);
            group.add(pupilR);
            
            // Antenas
            const antennaGeo = new THREE.ConeGeometry(0.07, 0.4, 6);
            const antennaMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            const ant1 = new THREE.Mesh(antennaGeo, antennaMat);
            ant1.position.set(-0.15, 1.5, 0);
            ant1.rotation.z = 0.2;
            group.add(ant1);
            const ant2 = new THREE.Mesh(antennaGeo, antennaMat);
            ant2.position.set(0.15, 1.5, 0);
            ant2.rotation.z = -0.2;
            group.add(ant2);
            
            // Base (aro)
            const baseGeo = new THREE.TorusGeometry(0.4, 0.05, 6, 20);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.rotation.x = Math.PI/2;
            base.position.y = 0.15;
            group.add(base);
            
            return group;
        }

        // --- Conversión GPS a metros relativos ---
        function latLonToMeters(lat, lon, refLat, refLon) {
            if (refLat === undefined || refLon === undefined) return { x: 0, z: 0 };
            const dx = (lon - refLon) * 111320 * Math.cos(refLat * Math.PI/180);
            const dz = (lat - refLat) * 111320;
            return { x: dx, z: -dz };
        }

        // --- Generar marcianos alrededor del punto de origen ---
        function generarMarcianos(centerLat, centerLon, cantidad = 12) {
            for (let i = 0; i < cantidad; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 15 + Math.random() * 35; // entre 15 y 50 metros
                const offsetX = Math.cos(angle) * dist;
                const offsetZ = Math.sin(angle) * dist;
                
                const latOffset = offsetZ / 111320;
                const lonOffset = offsetX / (111320 * Math.cos(centerLat * Math.PI/180));
                
                const alienLat = centerLat + latOffset;
                const alienLon = centerLon + lonOffset;
                
                const mesh = createAlien();
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Guardar coordenadas reales en userData
                mesh.userData = {
                    lat: alienLat,
                    lon: alienLon,
                    floatOffset: Math.random() * Math.PI * 2,
                    floatSpeed: 0.5 + Math.random() * 0.5,
                    rotationSpeed: 0.005 + Math.random() * 0.01,
                    baseY: 0
                };
                
                scene.add(mesh);
                marcianos.push(mesh);
            }
            statusDiv.innerHTML = `${marcianos.length} invasores generados`;
        }

        // --- Iniciar GPS (con fallback a posición fija para pruebas) ---
        function startGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        if (originLat === null) {
                            originLat = latitude;
                            originLon = longitude;
                            statusDiv.innerHTML = 'GPS fijado · Generando invasores...';
                            generarMarcianos(originLat, originLon, 15);
                        }
                        playerPosition.lat = latitude;
                        playerPosition.lon = longitude;
                    },
                    (err) => {
                        statusDiv.innerHTML = 'Error GPS, usando posición simulada';
                        if (originLat === null) {
                            originLat = 40.4168; // Madrid
                            originLon = -3.7038;
                            generarMarcianos(originLat, originLon, 15);
                        }
                    },
                    { enableHighAccuracy: true, timeout: 15000 }
                );
            } else {
                statusDiv.innerHTML = 'GPS no soportado, modo simulación';
                originLat = 40.4168;
                originLon = -3.7038;
                generarMarcianos(originLat, originLon, 15);
            }
        }

        // --- MANEJADOR DE ORIENTACIÓN CORREGIDO (ejes invertidos para control natural) ---
        function handleOrientation(event) {
            if (!gameActive) return;
            
            let beta = event.beta;  // Inclinación frontal (-180 a 180), 0 cuando el móvil está vertical mirando al horizonte
            let gamma = event.gamma; // Inclinación lateral (-90 a 90), 0 cuando está nivelado
            
            // En algunos dispositivos los valores pueden ser nulos
            if (beta === null || gamma === null) return;
            
            // Calibrar con la primera lectura (opcional, para que el frente sea donde el usuario empieza mirando)
            if (initialBeta === null) {
                initialBeta = beta;
                initialGamma = gamma;
                statusDiv.innerHTML = 'Orientación calibrada';
            }
            
            // Convertir a radianes
            const betaRad = THREE.MathUtils.degToRad(beta - initialBeta);
            const gammaRad = THREE.MathUtils.degToRad(gamma - initialGamma);
            
            // --- Ajuste de ejes para control natural ---
            // - gamma (lateral) controla la rotación en Y (guiñada): positivo a la derecha debe mirar a la derecha.
            // - beta (frontal) controla la rotación en X (cabeceo): positivo hacia arriba debe mirar arriba.
            // Límites para evitar que la cámara se voltee completamente
            const maxPitch = Math.PI / 2.2; // unos 80 grados
            const pitch = Math.max(-maxPitch, Math.min(maxPitch, betaRad));
            const yaw = gammaRad; // sin límite, puede girar 360 grados
            
            // Aplicar rotación: primero Y (guiñada), luego X (cabeceo) (orden ZXY podría funcionar, pero probamos así)
            camera.rotation.order = 'YXZ'; // Para que el cabeceo no afecte la guiñada
            camera.rotation.set(pitch, yaw, 0);
            
            // Nota: No usamos alpha (brújula) para no liar al usuario
        }

        // --- Solicitar permisos de orientación (iOS) ---
        function requestOrientation() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(perm => {
                        if (perm === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            document.getElementById('orientation-prompt').style.display = 'none';
                            statusDiv.innerHTML = 'Giroscopio OK';
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('orientation-prompt').style.display = 'none';
                statusDiv.innerHTML = 'Giroscopio OK';
            }
        }

        // Mostrar prompt si es necesario
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.getElementById('orientation-prompt').style.display = 'block';
            document.getElementById('request-orientation').addEventListener('click', requestOrientation);
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }

        // --- Disparo con raycasting ---
        function shoot() {
            if (!gameActive) return;
            const now = Date.now();
            if (now - lastShot < SHOT_COOLDOWN) return;
            lastShot = now;
            
            shootBtn.style.transform = 'scale(0.8)';
            setTimeout(() => shootBtn.style.transform = '', 150);
            
            const raycaster = new THREE.Raycaster();
            raycaster.ray.origin.copy(camera.position);
            raycaster.ray.direction.set(0, 0, -1).applyQuaternion(camera.quaternion);
            
            // Detección por esfera
            const hit = marcianos.find(marciano => {
                const sphere = new THREE.Sphere(marciano.position.clone(), 1.2);
                return raycaster.ray.intersectsSphere(sphere);
            });
            
            if (hit) {
                createExplosion(hit.position.clone());
                scene.remove(hit);
                marcianos = marcianos.filter(m => m !== hit);
                score += 100;
                scoreSpan.textContent = score;
                
                // Reponer uno nuevo
                if (originLat) {
                    setTimeout(() => generarMarcianos(originLat, originLon, 1), 800);
                }
            }
        }

        // --- Explosión de partículas (simple) ---
        function createExplosion(position) {
            const particleCount = 20;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i+=3) {
                positions[i] = position.x;
                positions[i+1] = position.y;
                positions[i+2] = position.z;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({ color: 0xff6600, size: 0.3, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            const velocities = [];
            for (let i = 0; i < particleCount; i++) {
                velocities.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.2,
                    (Math.random() - 0.5) * 0.2
                ));
            }
            
            let time = 0;
            const interval = setInterval(() => {
                if (time >= 20) {
                    clearInterval(interval);
                    scene.remove(particles);
                    return;
                }
                const pos = particles.geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    pos[i*3] += velocities[i].x;
                    pos[i*3+1] += velocities[i].y;
                    pos[i*3+2] += velocities[i].z;
                    velocities[i].y -= 0.005;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                time++;
            }, 30);
        }

        // --- Actualizar movimiento de marcianos (flotación y acercamiento) ---
        function updateMarcianos() {
            if (!gameActive || !originLat || !playerPosition.lat) return;
            
            const playerMeters = latLonToMeters(playerPosition.lat, playerPosition.lon, originLat, originLon);
            
            marcianos.forEach(marciano => {
                const alienMeters = latLonToMeters(marciano.userData.lat, marciano.userData.lon, originLat, originLon);
                
                // Dirección al jugador
                const dx = playerMeters.x - alienMeters.x;
                const dz = playerMeters.z - alienMeters.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                // Movimiento hacia el jugador si está lejos
                if (dist > 4) {
                    const speed = 0.015;
                    const moveX = (dx / dist) * speed;
                    const moveZ = (dz / dist) * speed;
                    
                    const deltaLat = -moveZ / 111320;
                    const deltaLon = moveX / (111320 * Math.cos(originLat * Math.PI/180));
                    
                    marciano.userData.lat += deltaLat;
                    marciano.userData.lon += deltaLon;
                }
                
                // Recalcular posición relativa al jugador
                const newMeters = latLonToMeters(marciano.userData.lat, marciano.userData.lon, originLat, originLon);
                const relX = newMeters.x - playerMeters.x;
                const relZ = newMeters.z - playerMeters.z;
                
                // Flotación senoidal
                const floatY = Math.sin(Date.now() * 0.003 + marciano.userData.floatOffset) * 0.3;
                marciano.position.set(relX, 1.0 + floatY, relZ);
                
                // Rotación para mirar al jugador (solo en Y)
                marciano.lookAt(0, marciano.position.y, 0);
                marciano.rotation.y += marciano.userData.rotationSpeed; // rotación adicional
            });
        }

        // --- Colisiones (marciano toca al jugador) ---
        function checkCollisions() {
            if (!gameActive) return;
            
            marcianos.forEach(marciano => {
                const dist = marciano.position.length();
                if (dist < 2.5) {
                    lives--;
                    livesSpan.textContent = lives;
                    
                    scene.remove(marciano);
                    marcianos = marcianos.filter(m => m !== marciano);
                    
                    if (lives <= 0) {
                        gameActive = false;
                        gameoverDiv.style.display = 'block';
                        restartBtn.style.display = 'block';
                    } else {
                        // Reponer uno
                        if (originLat) generarMarcianos(originLat, originLon, 1);
                    }
                }
            });
        }

        // --- Reiniciar ---
        function restartGame() {
            lives = 3;
            score = 0;
            gameActive = true;
            
            livesSpan.textContent = lives;
            scoreSpan.textContent = score;
            gameoverDiv.style.display = 'none';
            restartBtn.style.display = 'none';
            
            marcianos.forEach(m => scene.remove(m));
            marcianos = [];
            
            if (originLat) {
                generarMarcianos(originLat, originLon, 15);
            }
        }

        restartBtn.addEventListener('click', restartGame);
        shootBtn.addEventListener('click', shoot);
        shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        // --- Bucle de animación ---
        function animate() {
            requestAnimationFrame(animate);
            
            stars.rotation.y += 0.0002;
            
            updateMarcianos();
            checkCollisions();
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Arrancar GPS
        startGPS();
    </script>
</body>
</html>
