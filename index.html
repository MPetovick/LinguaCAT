<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SPACE INVADERS: Edición Callejera</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            background: black;
            padding: 30px 50px;
            border-radius: 20px;
            z-index: 200;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            border: 4px solid white;
            display: none;
            pointer-events: none;
            text-shadow: 4px 4px 0 #ff0;
        }
        #restart {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0;
            color: #00f;
            border: 4px solid #00f;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            z-index: 300;
            display: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 20px #ff0;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 100;
        }
        /* Mira (crosshair) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            z-index: 150;
            pointer-events: none;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            box-shadow: 0 0 5px red;
        }
        #crosshair::before {
            top: 50%;
            left: -10px;
            width: 60px;
            height: 2px;
            transform: translateY(-50%);
        }
        #crosshair::after {
            left: 50%;
            top: -10px;
            width: 2px;
            height: 60px;
            transform: translateX(-50%);
        }
        /* Botón de disparo */
        #shoot-btn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.8);
            border: 5px solid white;
            box-shadow: 0 0 20px red;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #shoot-btn:active {
            transform: scale(0.9);
            background: rgba(200, 0, 0, 0.9);
        }
        video {
            display: none;
        }
        /* Mensaje de permiso de orientación */
        #orientation-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px;
            border-radius: 20px;
            z-index: 400;
            text-align: center;
            border: 2px solid #0f0;
            display: none;
        }
        #orientation-prompt button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 18px;
            background: #0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">❤️ x <span id="lives">3</span></div>
    <div id="score">👾 <span id="points">0</span></div>
    <div id="gameover">GAME OVER</div>
    <div id="restart">VOLVER A JUGAR</div>
    <div id="status">Inicializando...</div>
    <div id="crosshair"></div>
    <div id="shoot-btn">🔫</div>
    <div id="orientation-prompt">
        <p>Necesitamos acceso a la orientación del dispositivo para apuntar.</p>
        <button id="request-orientation">Permitir</button>
    </div>

    <!-- Importamos Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuración inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Fondo mientras la cámara no está lista

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Altura de ojos

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Elementos del juego ---
        let playerPosition = { lat: 0, lon: 0 }; // Posición real del jugador (GPS)
        let marcianos = [];
        let lives = 3;
        let score = 0;
        let gameActive = true;
        let lastShot = 0;
        const shotCooldown = 300; // ms

        // UI elements
        const livesSpan = document.getElementById('lives');
        const pointsSpan = document.getElementById('points');
        const gameoverDiv = document.getElementById('gameover');
        const restartBtn = document.getElementById('restart');
        const statusDiv = document.getElementById('status');
        const shootBtn = document.getElementById('shoot-btn');

        // --- Configuración de la cámara real como textura de fondo ---
        let videoElement = document.createElement('video');
        videoElement.autoplay = true;
        videoElement.playsInline = true;
        videoElement.style.display = 'none';
        document.body.appendChild(videoElement);

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: { exact: "environment" } },
                audio: false
            }).then(function(stream) {
                videoElement.srcObject = stream;
                videoElement.play();
                statusDiv.innerHTML = 'Cámara OK';
                
                const videoTexture = new THREE.VideoTexture(videoElement);
                videoTexture.minFilter = THREE.LinearFilter;
                videoTexture.magFilter = THREE.LinearFilter;
                videoTexture.format = THREE.RGBAFormat;
                scene.background = videoTexture;
            }).catch(function(error) {
                statusDiv.innerHTML = 'Error cámara: ' + error.message;
                scene.background = new THREE.Color(0x87CEEB);
            });
        } else {
            statusDiv.innerHTML = 'API de cámara no soportada';
            scene.background = new THREE.Color(0x87CEEB);
        }

        // --- Luces ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);

        // --- Sistema de coordenadas GPS a metros ---
        let originLat = null;
        let originLon = null;

        function latLonToMeters(lat, lon, refLat, refLon) {
            if (refLat === undefined || refLon === undefined) return { x: 0, z: 0 };
            const dx = (lon - refLon) * 111320 * Math.cos(refLat * Math.PI/180);
            const dz = (lat - refLat) * 111320;
            return { x: dx, z: -dz }; // -z para que norte sea -z (Three.js)
        }

        // --- Generar marcianos alrededor del punto de origen ---
        function generarMarcianos(centerLat, centerLon, cantidad = 8) {
            for (let i = 0; i < cantidad; i++) {
                // Posición aleatoria en un radio de 20 a 50 metros
                const angle = Math.random() * Math.PI * 2;
                const dist = 20 + Math.random() * 30;
                const offsetX = Math.cos(angle) * dist;
                const offsetZ = Math.sin(angle) * dist;
                
                const latOffset = offsetZ / 111320;
                const lonOffset = offsetX / (111320 * Math.cos(centerLat * Math.PI/180));
                
                const marcianoLat = centerLat + latOffset;
                const marcianoLon = centerLon + lonOffset;
                
                // Crear modelo 3D (un marciano simple: cuerpo, ojos, antena)
                const group = new THREE.Group();
                
                // Cuerpo (base cuadrada)
                const bodyGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x112211 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.4;
                group.add(body);
                
                // Ojos (dos esferas blancas con pupilas negras)
                const eyeGeo = new THREE.SphereGeometry(0.15, 8);
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const pupilGeo = new THREE.SphereGeometry(0.08, 6);
                const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(-0.25, 0.7, 0.4);
                group.add(eyeL);
                const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
                pupilL.position.set(-0.25, 0.7, 0.55);
                group.add(pupilL);
                
                const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
                eyeR.position.set(0.25, 0.7, 0.4);
                group.add(eyeR);
                const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
                pupilR.position.set(0.25, 0.7, 0.55);
                group.add(pupilR);
                
                // Antena
                const antennaGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5);
                const antennaMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                const antenna = new THREE.Mesh(antennaGeo, antennaMat);
                antenna.position.set(0, 1.1, 0);
                group.add(antenna);
                const antenaBola = new THREE.SphereGeometry(0.1);
                const bolaMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
                const bola = new THREE.Mesh(antenaBola, bolaMat);
                bola.position.set(0, 1.35, 0);
                group.add(bola);
                
                // Posicionar en el mundo
                const pos = latLonToMeters(marcianoLat, marcianoLon, centerLat, centerLon);
                group.position.set(pos.x, 0, pos.z);
                
                scene.add(group);
                
                marcianos.push({
                    mesh: group,
                    lat: marcianoLat,
                    lon: marcianoLon,
                    health: 1,
                    speed: 0.2 + Math.random() * 0.3
                });
            }
        }

        // --- Iniciar GPS ---
        function startGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        if (originLat === null) {
                            originLat = latitude;
                            originLon = longitude;
                            statusDiv.innerHTML = 'GPS fijado';
                            generarMarcianos(originLat, originLon, 12);
                        }
                        playerPosition.lat = latitude;
                        playerPosition.lon = longitude;
                    },
                    (error) => {
                        statusDiv.innerHTML = 'Error GPS: ' + error.message;
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
            } else {
                statusDiv.innerHTML = 'GPS no soportado';
            }
        }

        // --- Orientación del dispositivo (para apuntar) ---
        function requestOrientation() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            document.getElementById('orientation-prompt').style.display = 'none';
                        }
                    })
                    .catch(console.error);
            } else {
                // Android
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('orientation-prompt').style.display = 'none';
            }
        }

        // Manejador de orientación: actualiza la rotación de la cámara
        function handleOrientation(event) {
            if (!gameActive) return;
            
            // alpha: rotación alrededor del eje Z (0 a 360), beta: alrededor del eje X (-180 a 180), gamma: alrededor del eje Y (-90 a 90)
            const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0;
            const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;
            const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0;
            
            // En Three.js, la cámara mira hacia -Z con up en Y.
            // Usamos la convención YXZ (similar a la de los dispositivos)
            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            camera.quaternion.setFromEuler(euler);
            
            // Opcional: invertir algunos ejes según pruebas
            // Ajuste fino para que la cámara apunte correctamente
            camera.rotateX(Math.PI / 2); // Corregir para que el horizonte sea horizontal
        }

        // Mostrar prompt en iOS
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.getElementById('orientation-prompt').style.display = 'block';
            document.getElementById('request-orientation').addEventListener('click', requestOrientation);
        } else {
            // En Android, solicitamos directamente
            window.addEventListener('deviceorientation', handleOrientation);
        }

        // --- Disparo ---
        function shoot() {
            if (!gameActive) return;
            
            const now = Date.now();
            if (now - lastShot < shotCooldown) return;
            lastShot = now;
            
            // Efecto visual: pequeño destello en el botón
            shootBtn.style.transform = 'scale(0.9)';
            setTimeout(() => shootBtn.style.transform = '', 100);
            
            // Crear rayo desde la cámara en la dirección que mira
            const raycaster = new THREE.Raycaster();
            raycaster.ray.origin.copy(camera.position);
            raycaster.ray.direction.set(0, 0, -1).applyQuaternion(camera.quaternion);
            
            // Comprobar colisiones con marcianos (usamos esferas para simplificar)
            const hit = marcianos.find(marciano => {
                // Distancia al rayo
                const marcianoPos = marciano.mesh.position.clone();
                const distToRay = raycaster.ray.distanceToPoint(marcianoPos);
                // Radio aproximado del marciano (0.8)
                return distToRay < 1.0;
            });
            
            if (hit) {
                // Eliminar marciano
                scene.remove(hit.mesh);
                marcianos = marcianos.filter(m => m !== hit);
                score += 100;
                pointsSpan.textContent = score;
                
                // Efecto de explosión simple (podríamos añadir una partícula)
                statusDiv.innerHTML = '¡Impacto!';
                setTimeout(() => statusDiv.innerHTML = 'Jugando...', 200);
                
                // Generar un nuevo marciano en otro lugar para mantener la población
                if (originLat) {
                    generarMarcianos(originLat, originLon, 1);
                }
            } else {
                statusDiv.innerHTML = 'Fallaste';
                setTimeout(() => statusDiv.innerHTML = 'Jugando...', 200);
            }
        }

        shootBtn.addEventListener('click', shoot);
        shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        // --- Actualizar movimiento de marcianos (se acercan lentamente al jugador) ---
        function updateMarcianos() {
            if (!gameActive || originLat === null || !playerPosition.lat) return;
            
            const playerMeters = latLonToMeters(playerPosition.lat, playerPosition.lon, originLat, originLon);
            
            marcianos.forEach(marciano => {
                // Convertir lat/lon del marciano a metros relativos al origen
                const marcianoMeters = latLonToMeters(marciano.lat, marciano.lon, originLat, originLon);
                
                // Vector del marciano al jugador
                const dx = playerMeters.x - marcianoMeters.x;
                const dz = playerMeters.z - marcianoMeters.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                if (dist > 2) {
                    // Moverse hacia el jugador
                    const moveX = (dx / dist) * marciano.speed * 0.05;
                    const moveZ = (dz / dist) * marciano.speed * 0.05;
                    
                    // Actualizar lat/lon (aproximado)
                    const deltaLat = -moveZ / 111320;
                    const deltaLon = moveX / (111320 * Math.cos(originLat * Math.PI/180));
                    
                    marciano.lat += deltaLat;
                    marciano.lon += deltaLon;
                }
                
                // Actualizar posición del mesh
                const newPos = latLonToMeters(marciano.lat, marciano.lon, originLat, originLon);
                marciano.mesh.position.set(newPos.x - playerMeters.x, 0, newPos.z - playerMeters.z);
                
                // Rotar para que mire al jugador (opcional)
                marciano.mesh.lookAt(0, 0, 0); // El jugador está en (0,0,0) en coordenadas relativas
            });
        }

        // --- Detectar si un marciano alcanza al jugador (distancia muy cercana) ---
        function checkMarcianoCollisions() {
            if (!gameActive) return;
            
            marcianos.forEach(marciano => {
                const dist = marciano.mesh.position.length();
                if (dist < 2.0) {
                    // Marciano te ataca
                    lives--;
                    livesSpan.textContent = lives;
                    
                    // Eliminar ese marciano (se sacrifica)
                    scene.remove(marciano.mesh);
                    marcianos = marcianos.filter(m => m !== marciano);
                    
                    if (lives <= 0) {
                        gameActive = false;
                        gameoverDiv.style.display = 'block';
                        restartBtn.style.display = 'block';
                    } else {
                        // Generar uno nuevo en otro lugar
                        if (originLat) generarMarcianos(originLat, originLon, 1);
                    }
                }
            });
        }

        // --- Reiniciar ---
        function restartGame() {
            lives = 3;
            score = 0;
            gameActive = true;
            
            livesSpan.textContent = lives;
            pointsSpan.textContent = score;
            gameoverDiv.style.display = 'none';
            restartBtn.style.display = 'none';
            
            // Limpiar marcianos
            marcianos.forEach(m => scene.remove(m.mesh));
            marcianos = [];
            
            // Regenerar
            if (originLat) {
                generarMarcianos(originLat, originLon, 12);
            }
        }

        restartBtn.addEventListener('click', restartGame);

        // --- Animación ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (originLat !== null && playerPosition.lat) {
                // Actualizar posiciones relativas de los marcianos (el mundo se mueve al revés)
                const playerMeters = latLonToMeters(playerPosition.lat, playerPosition.lon, originLat, originLon);
                
                // Actualizar cada marciano: su posición en la escena debe ser (marcianoMeters - playerMeters)
                marcianos.forEach(marciano => {
                    const marcianoMeters = latLonToMeters(marciano.lat, marciano.lon, originLat, originLon);
                    marciano.mesh.position.set(marcianoMeters.x - playerMeters.x, 0, marcianoMeters.z - playerMeters.z);
                });
                
                // Mover marcianos hacia el jugador
                updateMarcianos();
                
                // Detectar colisiones
                checkMarcianoCollisions();
            }
            
            renderer.render(scene, camera);
        }
        
        animate();

        // --- Ajustar tamaño de ventana ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Iniciar GPS
        startGPS();

        console.log('Space Invaders: Edición Callejera iniciado');
    </script>
</body>
</html>
