<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mundo 3D · Controles táctiles mejorados</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
        }
        .joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 130px;
            height: 130px;
            z-index: 20;
            pointer-events: auto;
        }
        .joystick-container.right {
            left: auto;
            right: 40px;
        }
        canvas {
            display: block;
        }
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s;
        }
        /* Instrucciones */
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 15;
            white-space: nowrap;
        }
    </style>
    <!-- Librerías: Three.js y nipple.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
</head>
<body>
    <div id="loading">Cargando mundo...</div>
    <div id="info">🌲 Bosque | 💧 Lagos | 🏖️ Playas</div>
    <div id="instructions">←→ Mover lateral | ↑↓ Avanzar/retroceder | Arrastra para mirar</div>
    
    <!-- Joysticks -->
    <div id="joystick-move" class="joystick-container"></div> <!-- Azul (adelante/atrás) -->
    <div id="joystick-strafe" class="joystick-container right"></div> <!-- Rojo (lateral) -->

    <script type="module">
        import * as THREE from 'three';

        // --- Configuración inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 300);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(50, 20, 50);
        camera.rotation.order = 'YXZ'; // Para evitar gimbal lock

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Ocultar loading
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);

        // --- Luces (igual que antes) ---
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(100, 100, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        const d = 150;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 250;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-50, 30, -50);
        scene.add(fillLight);

        // --- Terreno (procedural) ---
        const terrainSize = 400;
        const terrainSegments = 200;
        const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
        terrainGeo.rotateX(-Math.PI / 2);

        const positionAttribute = terrainGeo.attributes.position;
        const vertex = new THREE.Vector3();
        for (let i = 0; i < positionAttribute.count; i++) {
            vertex.fromBufferAttribute(positionAttribute, i);
            const x = vertex.x;
            const z = vertex.z;

            let y = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 15;
            y += Math.sin(x * 0.05) * 5;
            y += Math.cos(z * 0.07) * 5;
            y += Math.random() * 2;

            const distFromCenter = Math.sqrt(x*x + z*z);
            if (distFromCenter < 40) {
                y = -2 + Math.sin(x*0.2)*0.5; // Lago
            } else if (distFromCenter > 180) {
                y = 1 + Math.sin(x*0.1)*0.5; // Playas
            }

            vertex.y = y;
            positionAttribute.setY(i, y);
        }
        terrainGeo.computeVertexNormals();

        const textureLoader = new THREE.TextureLoader();
        const grassTex = textureLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
        grassTex.repeat.set(20, 20);

        const terrainMaterial = new THREE.MeshStandardMaterial({
            map: grassTex,
            color: 0xffffff,
            roughness: 0.6,
            metalness: 0.1
        });

        const terrain = new THREE.Mesh(terrainGeo, terrainMaterial);
        terrain.receiveShadow = true;
        terrain.castShadow = false;
        scene.add(terrain);

        // --- Agua ---
        const waterGeometry = new THREE.CircleGeometry(60, 64);
        waterGeometry.rotateX(-Math.PI / 2);
        const waterMaterial = new THREE.MeshStandardMaterial({
            color: 0x2a6f8f,
            transparent: true,
            opacity: 0.8,
            roughness: 0.1,
            metalness: 0.3
        });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.position.set(0, -1.5, 0);
        water.receiveShadow = true;
        scene.add(water);

        // --- Playas (anillo) ---
        const beachGeometry = new THREE.RingGeometry(35, 60, 64);
        beachGeometry.rotateX(-Math.PI / 2);
        const beachMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5e6d3,
            roughness: 0.8,
            side: THREE.DoubleSide
        });
        const beach = new THREE.Mesh(beachGeometry, beachMaterial);
        beach.position.set(0, -1.2, 0);
        beach.receiveShadow = true;
        scene.add(beach);

        // --- Árboles (instanciados con grupo) ---
        function createTreeTemplate() {
            const group = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.8, 1.2, 4);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 2;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);

            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E8B57 });
            const leaf1 = new THREE.Mesh(new THREE.SphereGeometry(1.5, 6), leafMat);
            leaf1.position.set(0, 4.5, 0);
            leaf1.castShadow = true;
            leaf1.receiveShadow = true;
            group.add(leaf1);
            
            const leaf2 = new THREE.Mesh(new THREE.SphereGeometry(1.2, 6), leafMat);
            leaf2.position.set(1, 4, 0.5);
            leaf2.castShadow = true;
            leaf2.receiveShadow = true;
            group.add(leaf2);
            
            const leaf3 = new THREE.Mesh(new THREE.SphereGeometry(1.2, 6), leafMat);
            leaf3.position.set(-0.8, 4, 1);
            leaf3.castShadow = true;
            leaf3.receiveShadow = true;
            group.add(leaf3);
            
            const leaf4 = new THREE.Mesh(new THREE.SphereGeometry(1.2, 6), leafMat);
            leaf4.position.set(0.5, 4, -1);
            leaf4.castShadow = true;
            leaf4.receiveShadow = true;
            group.add(leaf4);
            
            return group;
        }

        const treeTemplate = createTreeTemplate();
        for (let i = 0; i < 600; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 40 + Math.random() * 150;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            // Altura aproximada
            let y = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 15;
            y += Math.sin(x * 0.05) * 5;
            y += Math.cos(z * 0.07) * 5;
            y += Math.random() * 2;
            
            if (Math.sqrt(x*x + z*z) < 45) continue; // No en el lago
            
            const tree = treeTemplate.clone();
            tree.position.set(x, y, z);
            tree.scale.set(0.8 + Math.random()*0.4, 0.8+Math.random()*0.4, 0.8+Math.random()*0.4);
            tree.rotation.y = Math.random() * Math.PI * 2;
            tree.castShadow = true;
            tree.receiveShadow = true;
            scene.add(tree);
        }

        // --- Rocas ---
        const rockGeo = new THREE.DodecahedronGeometry(0.8);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
        for (let i = 0; i < 200; i++) {
            const rock = new THREE.Mesh(rockGeo, rockMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 20 + Math.random() * 170;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            let y = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 15 + 0.5;
            rock.position.set(x, y, z);
            rock.scale.set(1 + Math.random(), 1+Math.random(), 1+Math.random());
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        // --- Nubes simples ---
        const cloudGeo = new THREE.SphereGeometry(0.8, 6);
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
        for (let i = 0; i < 30; i++) {
            const cloud = new THREE.Mesh(cloudGeo, cloudMat);
            cloud.position.set(
                (Math.random() - 0.5) * 300,
                50 + Math.random() * 30,
                (Math.random() - 0.5) * 300
            );
            cloud.scale.set(5 + Math.random()*5, 1, 3+Math.random()*3);
            scene.add(cloud);
        }

        // --- CONTROLES TÁCTILES MEJORADOS ---
        // Joystick izquierdo (movimiento adelante/atrás) - color azul
        const moveJoystick = nipplejs.create({
            zone: document.getElementById('joystick-move'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'blue',
            size: 100,
            lockY: false,
            lockX: false
        });

        // Joystick derecho (movimiento lateral) - color rojo
        const strafeJoystick = nipplejs.create({
            zone: document.getElementById('joystick-strafe'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'red',
            size: 100,
            lockY: false,
            lockX: false
        });

        // Variables de entrada suavizadas
        const input = {
            forward: 0,    // -1..1 (adelante/atrás)
            strafe: 0,     // -1..1 (izquierda/derecha)
            lookX: 0,      // acumulador para rotación horizontal
            lookY: 0       // acumulador para rotación vertical (limitada)
        };

        // Joystick izquierdo: solo eje Y (adelante/atrás)
        moveJoystick.on('move', (evt, data) => {
            // data.vector.y es hacia arriba en el joystick (0 a 1) pero queremos que hacia arriba sea adelante
            // Normalmente, hacia arriba (ángulo 0) da vector.y = -1? Depende. En nipple, vector.y va de -1 a 1, siendo -1 arriba.
            // Ajustamos para que al empujar hacia arriba (vector.y negativo) sea adelante.
            input.forward = -data.vector.y; // -1..1, positivo = adelante
        }).on('end', () => {
            input.forward = 0;
        });

        // Joystick derecho: solo eje X (lateral)
        strafeJoystick.on('move', (evt, data) => {
            input.strafe = data.vector.x; // -1..1, positivo = derecha
        }).on('end', () => {
            input.strafe = 0;
        });

        // Rotación con arrastre de un dedo (touch move)
        let isTouching = false;
        let lastTouchX = 0, lastTouchY = 0;
        const lookSensitivity = 0.005;

        renderer.domElement.addEventListener('touchstart', (e) => {
            // Solo si es un solo dedo y no está sobre los joysticks (lo dejamos así, pero se puede mejorar)
            if (e.touches.length === 1) {
                isTouching = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        });

        renderer.domElement.addEventListener('touchmove', (e) => {
            if (isTouching && e.touches.length === 1) {
                const dx = e.touches[0].clientX - lastTouchX;
                const dy = e.touches[0].clientY - lastTouchY;
                
                input.lookX += dx * lookSensitivity;
                input.lookY += dy * lookSensitivity;
                
                // Limitar la rotación vertical para no voltear
                input.lookY = Math.max(-Math.PI/3, Math.min(Math.PI/3, input.lookY));
                
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        });

        renderer.domElement.addEventListener('touchend', () => {
            isTouching = false;
        });

        // También soporte para ratón (para pruebas en escritorio)
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isTouching = true;
                lastTouchX = e.clientX;
                lastTouchY = e.clientY;
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (isTouching) {
                const dx = e.clientX - lastTouchX;
                const dy = e.clientY - lastTouchY;
                input.lookX += dx * lookSensitivity;
                input.lookY += dy * lookSensitivity;
                input.lookY = Math.max(-Math.PI/3, Math.min(Math.PI/3, input.lookY));
                lastTouchX = e.clientX;
                lastTouchY = e.clientY;
            }
        });
        window.addEventListener('mouseup', () => {
            isTouching = false;
        });

        // --- Variables de movimiento suavizado ---
        const moveSpeed = 0.4;
        const smoothFactor = 0.15; // filtro pasa-bajos para suavizar cambios bruscos
        const targetVelocity = new THREE.Vector3();
        const currentVelocity = new THREE.Vector3();

        // --- Bucle de animación con delta time para movimiento independiente de fps ---
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            // Limitar delta a 0.1 para evitar picos
            const safeDelta = Math.min(delta, 0.1);

            // Aplicar rotación de cámara acumulada
            camera.rotation.x = input.lookY;
            camera.rotation.y += input.lookX; // acumulativo
            // Reseteamos lookX para que no siga acumulando infinitamente (ya que es incremental)
            input.lookX = 0; // la rotación se aplica cada frame, pero el input es diferencial, así que lo reiniciamos

            // Calcular dirección de movimiento
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0;
            right.normalize();

            // Velocidad deseada
            targetVelocity.set(0, 0, 0);
            targetVelocity.addScaledVector(forward, input.forward * moveSpeed);
            targetVelocity.addScaledVector(right, input.strafe * moveSpeed);

            // Suavizado
            currentVelocity.lerp(targetVelocity, smoothFactor);

            // Aplicar movimiento
            camera.position.addScaledVector(currentVelocity, safeDelta * 60); // multiplicamos por 60 para compensar delta

            // Animar agua y nubes
            water.rotation.y += 0.001;
            
            // Mover nubes
            scene.children.forEach(child => {
                if (child.material && child.material.color.getHex() === 0xffffff && child.geometry.type === 'SphereGeometry') {
                    child.position.x += 0.01;
                    if (child.position.x > 200) child.position.x = -200;
                }
            });

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Mundo cargado con controles mejorados');
    </script>
</body>
</html>
