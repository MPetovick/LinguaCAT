<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Invaders AR - Edición Callejera Profesional</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 100;
            pointer-events: none;
        }
        #lives, #score {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #lives span, #score span {
            color: #ffaa00;
            margin-left: 10px;
            font-size: 28px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            z-index: 150;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            box-shadow: 0 0 10px red;
        }
        #crosshair::before {
            top: 50%;
            left: -15px;
            width: 90px;
            height: 3px;
            transform: translateY(-50%);
        }
        #crosshair::after {
            left: 50%;
            top: -15px;
            width: 3px;
            height: 90px;
            transform: translateX(-50%);
        }
        #shoot-btn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff5555, #aa0000);
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #shoot-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 1);
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ccc;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
        #compass {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(3px);
        }
        #compass::after {
            content: 'N';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            color: red;
            font-weight: bold;
        }
        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px 60px;
            border-radius: 30px;
            z-index: 300;
            text-align: center;
            border: 4px solid #ffaa00;
            display: none;
            backdrop-filter: blur(10px);
        }
        #gameover h1 {
            font-size: 60px;
            margin: 0;
            color: red;
            text-shadow: 0 0 20px red;
        }
        #restart {
            background: #ffaa00;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 28px;
            border-radius: 50px;
            margin-top: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        video {
            display: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="lives">❤️ <span id="lives-value">3</span></div>
        <div id="score">👾 <span id="score-value">0</span></div>
    </div>
    <div id="compass">🧭</div>
    <div id="crosshair"></div>
    <div id="shoot-btn">🔫</div>
    <div id="status">Inicializando...</div>
    <div id="gameover">
        <h1>GAME OVER</h1>
        <button id="restart">REINICIAR</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuración principal ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Color por defecto mientras se carga la cámara

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Altura de ojos

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limitar para rendimiento
        document.body.appendChild(renderer.domElement);

        // Variables del juego
        let gameActive = true;
        let lives = 3;
        let score = 0;
        let marcianos = [];
        let originLat = null;
        let originLon = null;
        let playerPos = { lat: 0, lon: 0 };
        let lastShootTime = 0;
        const SHOOT_COOLDOWN = 250; // ms

        // Elementos UI
        const livesSpan = document.getElementById('lives-value');
        const scoreSpan = document.getElementById('score-value');
        const statusDiv = document.getElementById('status');
        const shootBtn = document.getElementById('shoot-btn');
        const gameoverDiv = document.getElementById('gameover');
        const restartBtn = document.getElementById('restart');
        const compassDiv = document.getElementById('compass');

        // --- Configuración de la cámara real como textura de fondo ---
        let videoTexture = null;
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                
                videoTexture = new THREE.VideoTexture(video);
                videoTexture.minFilter = THREE.LinearFilter;
                videoTexture.magFilter = THREE.LinearFilter;
                videoTexture.format = THREE.RGBAFormat;
                scene.background = videoTexture;
                statusDiv.innerHTML = '📷 Cámara OK';
            } catch (error) {
                statusDiv.innerHTML = '📷 Error cámara: ' + error.message;
                scene.background = new THREE.Color(0x87CEEB); // Cielo azul
            }
        }
        initCamera();

        // --- Iluminación profesional ---
        // Luz ambiental suave
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Luz direccional principal
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        
        // Luz de relleno
        const fillLight = new THREE.DirectionalLight(0xffccaa, 0.5);
        fillLight.position.set(-1, 0.5, 1);
        scene.add(fillLight);
        
        // Luz de fondo
        const backLight = new THREE.DirectionalLight(0x4466ff, 0.3);
        backLight.position.set(0, 1, -1);
        scene.add(backLight);

        // --- GPS y movimiento ---
        function initGPS() {
            if (!navigator.geolocation) {
                statusDiv.innerHTML = '❌ GPS no soportado';
                return;
            }
            navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    if (originLat === null) {
                        originLat = latitude;
                        originLon = longitude;
                        statusDiv.innerHTML = '📍 GPS fijado';
                        generarMarcianos(20); // Generar 20 marcianos
                    }
                    playerPos.lat = latitude;
                    playerPos.lon = longitude;
                },
                (error) => {
                    statusDiv.innerHTML = '📍 Error GPS: ' + error.message;
                },
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
            );
        }
        initGPS();

        // --- Conversión de coordenadas GPS a metros relativos ---
        function latLonToMeters(lat, lon, refLat, refLon) {
            if (refLat === undefined || refLon === undefined) return { x: 0, z: 0 };
            const x = (lon - refLon) * 111320 * Math.cos(refLat * Math.PI / 180);
            const z = (lat - refLat) * 111320;
            return { x, z: -z }; // -z para que el norte sea -z (convención Three.js)
        }

        // --- Generar marcianos con modelos 3D más detallados ---
        function generarMarcianos(cantidad) {
            const marcianoModel = new THREE.Group();
            
            // Cuerpo principal (cilindro)
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.0, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x33aa33, emissive: 0x113311, roughness: 0.3, metalness: 0.1 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            marcianoModel.add(body);
            
            // Cabeza (esfera)
            const headGeo = new THREE.SphereGeometry(0.35, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x44cc44, emissive: 0x224422 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.1;
            marcianoModel.add(head);
            
            // Ojos (dos esferas blancas con pupilas)
            const eyeGeo = new THREE.SphereGeometry(0.1, 8);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pupilGeo = new THREE.SphereGeometry(0.05, 6);
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.15, 1.15, 0.3);
            marcianoModel.add(eyeL);
            const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
            pupilL.position.set(-0.15, 1.15, 0.38);
            marcianoModel.add(pupilL);
            
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.15, 1.15, 0.3);
            marcianoModel.add(eyeR);
            const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
            pupilR.position.set(0.15, 1.15, 0.38);
            marcianoModel.add(pupilR);
            
            // Antenas
            const antennaGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.4);
            const antennaMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            const antennaL = new THREE.Mesh(antennaGeo, antennaMat);
            antennaL.position.set(-0.2, 1.45, 0);
            antennaL.rotation.x = 0.3;
            marcianoModel.add(antennaL);
            
            const antennaR = new THREE.Mesh(antennaGeo, antennaMat);
            antennaR.position.set(0.2, 1.45, 0);
            antennaR.rotation.x = -0.3;
            marcianoModel.add(antennaR);
            
            // Brazos
            const armGeo = new THREE.BoxGeometry(0.15, 0.5, 0.15);
            const armMat = new THREE.MeshStandardMaterial({ color: 0x33aa33 });
            const armL = new THREE.Mesh(armGeo, armMat);
            armL.position.set(-0.6, 0.8, 0);
            armL.rotation.z = 0.3;
            marcianoModel.add(armL);
            
            const armR = new THREE.Mesh(armGeo, armMat);
            armR.position.set(0.6, 0.8, 0);
            armR.rotation.z = -0.3;
            marcianoModel.add(armR);
            
            // Clonar para cada marciano
            for (let i = 0; i < cantidad; i++) {
                // Posición aleatoria en un radio de 15 a 50 metros
                const angle = Math.random() * Math.PI * 2;
                const dist = 20 + Math.random() * 30;
                const offsetX = Math.cos(angle) * dist;
                const offsetZ = Math.sin(angle) * dist;
                
                // Convertir offset a lat/lon
                const latOffset = -offsetZ / 111320; // porque z invertido
                const lonOffset = offsetX / (111320 * Math.cos(originLat * Math.PI/180));
                
                const marcianoLat = originLat + latOffset;
                const marcianoLon = originLon + lonOffset;
                
                // Crear una copia del modelo
                const marciano = marcianoModel.clone();
                
                // Añadir un resplandor (punto de luz) para destacar
                const glowLight = new THREE.PointLight(0x00ff00, 0.5, 5);
                glowLight.position.set(0, 1, 0);
                marciano.add(glowLight);
                
                scene.add(marciano);
                
                marcianos.push({
                    mesh: marciano,
                    lat: marcianoLat,
                    lon: marcianoLon,
                    speed: 0.3 + Math.random() * 0.4,
                    health: 1,
                    angle: 0,
                    floatOffset: Math.random() * Math.PI * 2
                });
            }
            statusDiv.innerHTML = `👾 ${marcianos.length} marcianos generados`;
        }

        // --- Orientación del dispositivo (método mejorado) ---
        // Usaremos deviceorientation con calibración y filtro de complemento
        let orientationAlpha = 0, orientationBeta = 0, orientationGamma = 0;
        let compassHeading = 0; // Ángulo de la brújula (0 = norte)
        
        function handleOrientation(event) {
            // alpha: rotación alrededor del eje Z (0-360), beta: alrededor del eje X (-180 a 180), gamma: alrededor del eje Y (-90 a 90)
            // En la mayoría de dispositivos, alpha es la brújula, pero no siempre es preciso.
            orientationAlpha = event.alpha || 0;
            orientationBeta = event.beta || 0;
            orientationGamma = event.gamma || 0;
            
            // Convertir a radianes
            const alphaRad = THREE.MathUtils.degToRad(orientationAlpha);
            const betaRad = THREE.MathUtils.degToRad(orientationBeta);
            const gammaRad = THREE.MathUtils.degToRad(orientationGamma);
            
            // Crear un cuaternión que represente la orientación del dispositivo
            // Orden de rotación: Y (alpha), X (beta), Z (gamma) - pero depende del sistema de coordenadas
            // Usamos la convención Z-X-Y (o Y-X-Z) según la documentación de three.js
            // Para que la cámara mire en la dirección que apunta el móvil, necesitamos mapear correctamente.
            
            // En three.js, la cámara mira hacia -Z con up en Y.
            // Queremos que cuando el móvil apunte hacia adelante, la cámara mire hacia -Z.
            // Probaremos con la siguiente transformación:
            const euler = new THREE.Euler(betaRad, alphaRad, -gammaRad, 'YXZ');
            camera.quaternion.setFromEuler(euler);
            
            // Ajuste fino para que el horizonte sea horizontal
            // Esto depende del dispositivo, se puede calibrar
            
            // Actualizar la brújula visual
            compassDiv.innerHTML = `🧭 ${Math.round(orientationAlpha)}°`;
        }

        // Solicitar permisos para iOS
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            // Mostrar algún botón para solicitar permiso (simplificado: lo pedimos directamente al cargar)
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    } else {
                        statusDiv.innerHTML = '❌ Permiso de orientación denegado';
                    }
                })
                .catch(console.error);
        } else {
            // Android
            window.addEventListener('deviceorientation', handleOrientation);
        }

        // --- Lógica de disparo mejorada con raycast ---
        function shoot() {
            if (!gameActive) return;
            const now = Date.now();
            if (now - lastShootTime < SHOOT_COOLDOWN) return;
            lastShootTime = now;
            
            // Efecto visual
            shootBtn.style.transform = 'scale(0.9)';
            setTimeout(() => shootBtn.style.transform = '', 100);
            
            // Crear rayo desde la cámara
            const raycaster = new THREE.Raycaster();
            raycaster.ray.origin.copy(camera.position);
            raycaster.ray.direction.set(0, 0, -1).applyQuaternion(camera.quaternion);
            
            // Detectar colisiones con marcianos (usamos esferas para cada marciano)
            let hit = null;
            let minDist = Infinity;
            
            marcianos.forEach(marciano => {
                // Posición del marciano en coordenadas de la escena
                const pos = marciano.mesh.position.clone();
                // Distancia al rayo
                const distToRay = raycaster.ray.distanceToPoint(pos);
                // Radio aproximado del marciano (0.8)
                if (distToRay < 1.0) {
                    // Calcular distancia a lo largo del rayo para seleccionar el más cercano
                    const direction = raycaster.ray.direction;
                    const toPoint = pos.clone().sub(raycaster.ray.origin);
                    const t = direction.dot(toPoint);
                    if (t > 0 && t < minDist) {
                        minDist = t;
                        hit = marciano;
                    }
                }
            });
            
            if (hit) {
                // Eliminar marciano
                scene.remove(hit.mesh);
                marcianos = marcianos.filter(m => m !== hit);
                score += 100;
                scoreSpan.textContent = score;
                
                // Efecto de impacto (podríamos añadir partículas)
                statusDiv.innerHTML = '💥 Impacto!';
                setTimeout(() => statusDiv.innerHTML = '🎯 Jugando...', 200);
                
                // Generar un nuevo marciano en otro lugar
                if (originLat) {
                    generarMarcianos(1);
                }
            } else {
                statusDiv.innerHTML = '💨 Fallaste';
                setTimeout(() => statusDiv.innerHTML = '🎯 Jugando...', 200);
            }
        }

        shootBtn.addEventListener('click', shoot);
        shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        // --- Movimiento de marcianos mejorado ---
        function updateMarcianos() {
            if (!gameActive || !originLat || !playerPos.lat) return;
            
            // Posición del jugador en metros relativos al origen
            const playerMeters = latLonToMeters(playerPos.lat, playerPos.lon, originLat, originLon);
            
            marcianos.forEach(marciano => {
                // Posición del marciano en metros
                const marcianoMeters = latLonToMeters(marciano.lat, marciano.lon, originLat, originLon);
                
                // Vector hacia el jugador
                const dx = playerMeters.x - marcianoMeters.x;
                const dz = playerMeters.z - marcianoMeters.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                if (dist > 2) {
                    // Movimiento suave hacia el jugador
                    const speed = marciano.speed * 0.05;
                    const moveX = (dx / dist) * speed;
                    const moveZ = (dz / dist) * speed;
                    
                    // Actualizar lat/lon
                    const deltaLat = -moveZ / 111320;
                    const deltaLon = moveX / (111320 * Math.cos(originLat * Math.PI/180));
                    
                    marciano.lat += deltaLat;
                    marciano.lon += deltaLon;
                }
                
                // Actualizar posición del mesh en la escena (relativa al jugador)
                const newMeters = latLonToMeters(marciano.lat, marciano.lon, originLat, originLon);
                marciano.mesh.position.set(newMeters.x - playerMeters.x, 0, newMeters.z - playerMeters.z);
                
                // Rotar para mirar al jugador
                marciano.mesh.lookAt(0, 1, 0); // El jugador está en (0,0,0) en coordenadas relativas
                
                // Animación de flotación
                marciano.angle = (marciano.angle || 0) + 0.05;
                marciano.mesh.position.y = Math.sin(marciano.angle + marciano.floatOffset) * 0.2;
            });
        }

        // --- Detección de colisiones (cuando un marciano llega al jugador) ---
        function checkCollisions() {
            if (!gameActive) return;
            
            marcianos.forEach(marciano => {
                const dist = marciano.mesh.position.length();
                if (dist < 2.0) {
                    // Marciano ataca
                    lives--;
                    livesSpan.textContent = lives;
                    
                    // Eliminar ese marciano
                    scene.remove(marciano.mesh);
                    marcianos = marcianos.filter(m => m !== marciano);
                    
                    if (lives <= 0) {
                        gameActive = false;
                        gameoverDiv.style.display = 'block';
                    } else {
                        // Generar un reemplazo
                        if (originLat) generarMarcianos(1);
                    }
                }
            });
        }

        // --- Reiniciar juego ---
        function restart() {
            // Limpiar marcianos
            marcianos.forEach(m => scene.remove(m.mesh));
            marcianos = [];
            lives = 3;
            score = 0;
            gameActive = true;
            livesSpan.textContent = lives;
            scoreSpan.textContent = score;
            gameoverDiv.style.display = 'none';
            
            if (originLat) {
                generarMarcianos(20);
            }
        }

        restartBtn.addEventListener('click', restart);

        // --- Bucle de animación ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameActive && originLat && playerPos.lat) {
                updateMarcianos();
                checkCollisions();
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // --- Ajuste de ventana ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Iniciar todo
        statusDiv.innerHTML = '🚀 Iniciando...';
    </script>
</body>
</html>
