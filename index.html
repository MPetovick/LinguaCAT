<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Space Invaders - Edición Callejera</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 100;
            pointer-events: none;
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 100;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            z-index: 150;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,0,0,0.8);
            box-shadow: 0 0 10px red;
        }
        #crosshair::before {
            top: 50%;
            left: -15px;
            width: 70px;
            height: 3px;
            transform: translateY(-50%);
        }
        #crosshair::after {
            left: 50%;
            top: -15px;
            width: 3px;
            height: 70px;
            transform: translateX(-50%);
        }
        #shoot-btn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.9);
            border: 5px solid white;
            box-shadow: 0 0 30px red;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            user-select: none;
            cursor: pointer;
            transition: transform 0.1s, background 0.1s;
            backdrop-filter: blur(5px);
        }
        #shoot-btn:active {
            transform: scale(0.85);
            background: rgba(200, 0, 0, 1);
        }
        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px 60px;
            border-radius: 30px;
            font-size: 48px;
            font-weight: bold;
            border: 4px solid #ff0;
            display: none;
            z-index: 300;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        #restart {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 310;
            box-shadow: 0 0 20px #ff0;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ccc;
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 100;
        }
        video { display: none; }
        #orientation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 400;
            font-size: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        #orientation-overlay button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 20px;
            background: #0f0;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">❤️ <span id="lives">3</span></div>
    <div id="score">👾 <span id="points">0</span></div>
    <div id="crosshair"></div>
    <div id="shoot-btn">🔫</div>
    <div id="gameover">GAME OVER</div>
    <div id="restart">VOLVER A JUGAR</div>
    <div id="status">Inicializando...</div>
    <div id="orientation-overlay" style="display: none;">
        <div>Necesitamos acceso a la orientación del dispositivo para apuntar.</div>
        <button id="request-orientation">Permitir acceso</button>
    </div>

    <!-- Import Three.js desde CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuración inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Fallback mientras carga cámara
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Altura de ojos
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limitar para rendimiento
        document.body.appendChild(renderer.domElement);

        // --- Variables globales del juego ---
        const gameState = {
            active: true,
            lives: 3,
            score: 0,
            playerLat: null,
            playerLon: null,
            originLat: null,
            originLon: null,
            enemies: [],
            lastShot: 0,
            shotCooldown: 300, // ms
            enemySpawnRadius: 30, // metros
            enemyCount: 12,
            powerMode: false,
            powerTimer: null
        };

        // Referencias UI
        const livesSpan = document.getElementById('lives');
        const pointsSpan = document.getElementById('points');
        const gameoverDiv = document.getElementById('gameover');
        const restartBtn = document.getElementById('restart');
        const statusDiv = document.getElementById('status');
        const shootBtn = document.getElementById('shoot-btn');
        const orientationOverlay = document.getElementById('orientation-overlay');
        const requestOrientationBtn = document.getElementById('request-orientation');

        // --- Configuración de la cámara real como textura de fondo ---
        let videoTexture = null;
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } }, 
                    audio: false 
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                
                videoTexture = new THREE.VideoTexture(video);
                videoTexture.minFilter = THREE.LinearFilter;
                videoTexture.magFilter = THREE.LinearFilter;
                videoTexture.format = THREE.RGBAFormat;
                scene.background = videoTexture;
                statusDiv.innerHTML = 'Cámara lista';
            } catch (error) {
                statusDiv.innerHTML = 'Error cámara: ' + error.message;
                scene.background = new THREE.Color(0x87CEEB); // Cielo azul fallback
            }
        }

        // --- Luces (mejoran la apariencia de los modelos) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-2, 1, -2);
        scene.add(backLight);

        // --- Funciones de utilidad GPS ---
        function latLonToMeters(lat, lon, refLat, refLon) {
            if (refLat === undefined || refLon === undefined) return { x: 0, z: 0 };
            const dx = (lon - refLon) * 111320 * Math.cos(refLat * Math.PI/180);
            const dz = (lat - refLat) * 111320;
            return { x: dx, z: -dz }; // -z para que norte sea -z en Three.js
        }

        // --- Crear modelo de marciano mejorado ---
        function createEnemyModel(color = 0x00ff00) {
            const group = new THREE.Group();
            
            // Cuerpo principal (esfera achatada)
            const bodyGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x112211, roughness: 0.4, metalness: 0.1 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.scale.set(1, 0.7, 1);
            body.position.y = 0.5;
            group.add(body);
            
            // Ojos (grandes y brillantes)
            const eyeGeo = new THREE.SphereGeometry(0.15, 8);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444 });
            const pupilGeo = new THREE.SphereGeometry(0.07, 6);
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.2, 0.7, 0.45);
            group.add(eyeL);
            const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
            pupilL.position.set(-0.2, 0.7, 0.6);
            group.add(pupilL);
            
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.2, 0.7, 0.45);
            group.add(eyeR);
            const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
            pupilR.position.set(0.2, 0.7, 0.6);
            group.add(pupilR);
            
            // Antena con luz
            const antennaGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5);
            const antennaMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });
            const antenna = new THREE.Mesh(antennaGeo, antennaMat);
            antenna.position.set(0, 1.0, 0);
            group.add(antenna);
            
            const antenaBolaGeo = new THREE.SphereGeometry(0.1, 6);
            const antenaBolaMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
            const antenaBola = new THREE.Mesh(antenaBolaGeo, antenaBolaMat);
            antenaBola.position.set(0, 1.25, 0);
            group.add(antenaBola);
            
            // Base (como un platillo)
            const baseGeo = new THREE.TorusGeometry(0.4, 0.1, 8, 20);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.rotation.x = Math.PI/2;
            base.position.y = 0.1;
            group.add(base);
            
            return group;
        }

        // --- Generar enemigos alrededor del origen ---
        function spawnEnemies(centerLat, centerLon, count) {
            for (let i = 0; i < count; i++) {
                // Posición aleatoria en un círculo
                const angle = Math.random() * Math.PI * 2;
                const dist = 15 + Math.random() * 30; // entre 15 y 45 metros
                const dx = Math.cos(angle) * dist;
                const dz = Math.sin(angle) * dist;
                
                const latOffset = dz / 111320;
                const lonOffset = dx / (111320 * Math.cos(centerLat * Math.PI/180));
                
                const enemyLat = centerLat + latOffset;
                const enemyLon = centerLon + lonOffset;
                
                const model = createEnemyModel(0x44ff44); // Verde brillante
                
                // Posición inicial en metros relativos al origen
                const pos = latLonToMeters(enemyLat, enemyLon, centerLat, centerLon);
                model.position.set(pos.x, 0.5, pos.z);
                
                scene.add(model);
                
                gameState.enemies.push({
                    mesh: model,
                    lat: enemyLat,
                    lon: enemyLon,
                    speed: 0.5 + Math.random() * 0.7,
                    health: 1,
                    floatOffset: Math.random() * Math.PI * 2
                });
            }
            statusDiv.innerHTML = `Enemigos: ${gameState.enemies.length}`;
        }

        // --- Iniciar GPS ---
        function initGPS() {
            if (!navigator.geolocation) {
                statusDiv.innerHTML = 'GPS no soportado';
                return;
            }
            navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    if (gameState.originLat === null) {
                        gameState.originLat = latitude;
                        gameState.originLon = longitude;
                        statusDiv.innerHTML = 'GPS fijado, generando enemigos...';
                        spawnEnemies(gameState.originLat, gameState.originLon, gameState.enemyCount);
                    }
                    gameState.playerLat = latitude;
                    gameState.playerLon = longitude;
                },
                (err) => {
                    statusDiv.innerHTML = 'Error GPS: ' + err.message;
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }

        // --- Orientación del dispositivo ---
        function handleOrientation(event) {
            if (!gameState.active) return;
            // Convertir a radianes y aplicar a la cámara
            const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0;
            const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;
            const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0;
            
            // Usamos la convención YXZ (como en la mayoría de dispositivos)
            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            camera.quaternion.setFromEuler(euler);
            
            // Ajuste para que el horizonte sea horizontal
            camera.rotateX(Math.PI / 2);
        }

        function requestOrientationPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permission => {
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            orientationOverlay.style.display = 'none';
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                orientationOverlay.style.display = 'none';
            }
        }

        // Mostrar overlay si es necesario
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            orientationOverlay.style.display = 'flex';
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }

        requestOrientationBtn.addEventListener('click', requestOrientationPermission);

        // --- Disparo ---
        function shoot() {
            if (!gameState.active) return;
            const now = Date.now();
            if (now - gameState.lastShot < gameState.shotCooldown) return;
            gameState.lastShot = now;

            // Efecto visual
            shootBtn.style.transform = 'scale(0.8)';
            setTimeout(() => shootBtn.style.transform = '', 100);

            // Rayo desde la cámara
            const raycaster = new THREE.Raycaster();
            raycaster.ray.origin.copy(camera.position);
            raycaster.ray.direction.set(0, 0, -1).applyQuaternion(camera.quaternion);

            // Buscar el enemigo más cercano en la dirección del rayo
            let closestHit = null;
            let closestDist = Infinity;
            
            gameState.enemies.forEach(enemy => {
                const enemyPos = enemy.mesh.position.clone();
                // Calcular distancia al rayo
                const distToRay = raycaster.ray.distanceToPoint(enemyPos);
                if (distToRay < 1.2) { // Tamaño de colisión
                    const distAlongRay = raycaster.ray.origin.distanceTo(enemyPos);
                    if (distAlongRay < closestDist) {
                        closestDist = distAlongRay;
                        closestHit = enemy;
                    }
                }
            });

            if (closestHit) {
                // Eliminar enemigo
                scene.remove(closestHit.mesh);
                gameState.enemies = gameState.enemies.filter(e => e !== closestHit);
                gameState.score += 100;
                pointsSpan.textContent = gameState.score;
                statusDiv.innerHTML = '¡Impacto!';

                // Reponer un enemigo si aún estamos jugando
                if (gameState.active && gameState.originLat) {
                    spawnEnemies(gameState.originLat, gameState.originLon, 1);
                }
            } else {
                statusDiv.innerHTML = 'Fallaste';
                setTimeout(() => statusDiv.innerHTML = 'Jugando...', 200);
            }
        }

        shootBtn.addEventListener('click', shoot);
        shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        // --- Actualizar enemigos (movimiento hacia el jugador) ---
        function updateEnemies() {
            if (!gameState.active || !gameState.playerLat || !gameState.originLat) return;

            const playerMeters = latLonToMeters(gameState.playerLat, gameState.playerLon, gameState.originLat, gameState.originLon);

            gameState.enemies.forEach(enemy => {
                // Convertir lat/lon del enemigo a metros relativos al origen
                const enemyMeters = latLonToMeters(enemy.lat, enemy.lon, gameState.originLat, gameState.originLon);
                
                // Vector hacia el jugador (en metros)
                const dx = playerMeters.x - enemyMeters.x;
                const dz = playerMeters.z - enemyMeters.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                if (dist > 2) {
                    // Moverse hacia el jugador con algo de inercia
                    const moveX = (dx / dist) * enemy.speed * 0.05;
                    const moveZ = (dz / dist) * enemy.speed * 0.05;
                    
                    // Actualizar lat/lon
                    const deltaLat = -moveZ / 111320;
                    const deltaLon = moveX / (111320 * Math.cos(gameState.originLat * Math.PI/180));
                    
                    enemy.lat += deltaLat;
                    enemy.lon += deltaLon;
                }
                
                // Actualizar posición del mesh en la escena (relativa al jugador)
                const newEnemyMeters = latLonToMeters(enemy.lat, enemy.lon, gameState.originLat, gameState.originLon);
                enemy.mesh.position.set(newEnemyMeters.x - playerMeters.x, 0.5, newEnemyMeters.z - playerMeters.z);
                
                // Rotar para mirar al jugador
                enemy.mesh.lookAt(0, 0.5, 0);
                
                // Animación de flotación
                enemy.floatOffset += 0.05;
                enemy.mesh.position.y = 0.5 + Math.sin(enemy.floatOffset) * 0.2;
            });
        }

        // --- Detectar colisiones (enemigo toca al jugador) ---
        function checkCollisions() {
            if (!gameState.active) return;

            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                const dist = enemy.mesh.position.length(); // Distancia al origen (jugador)
                
                if (dist < 1.8) {
                    // Colisión
                    scene.remove(enemy.mesh);
                    gameState.enemies.splice(i, 1);
                    gameState.lives--;
                    livesSpan.textContent = gameState.lives;
                    
                    if (gameState.lives <= 0) {
                        gameState.active = false;
                        gameoverDiv.style.display = 'block';
                        restartBtn.style.display = 'block';
                    } else {
                        // Generar un nuevo enemigo
                        if (gameState.originLat) {
                            spawnEnemies(gameState.originLat, gameState.originLon, 1);
                        }
                    }
                }
            }
        }

        // --- Reiniciar juego ---
        function restartGame() {
            gameState.active = true;
            gameState.lives = 3;
            gameState.score = 0;
            gameState.lastShot = 0;
            livesSpan.textContent = gameState.lives;
            pointsSpan.textContent = gameState.score;
            gameoverDiv.style.display = 'none';
            restartBtn.style.display = 'none';
            
            // Eliminar todos los enemigos
            gameState.enemies.forEach(e => scene.remove(e.mesh));
            gameState.enemies = [];
            
            // Regenerar si tenemos origen
            if (gameState.originLat) {
                spawnEnemies(gameState.originLat, gameState.originLon, gameState.enemyCount);
            }
        }

        restartBtn.addEventListener('click', restartGame);

        // --- Bucle de animación ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameState.active) {
                updateEnemies();
                checkCollisions();
            }
            
            renderer.render(scene, camera);
        }

        // --- Inicialización ---
        async function init() {
            await initCamera();
            initGPS();
            animate();
        }

        init();

        // --- Ajuste de tamaño de ventana ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
