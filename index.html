<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mundo 3D: Bosque, Lagos y Playas</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none; /* Evita desplazamientos táctiles */
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
        }
        /* Estilos del joystick */
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 200;
            touch-action: none;
        }
        #joystick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            touch-action: none;
            transition: background 0.1s;
        }
        #joystick:active {
            background: rgba(255, 255, 255, 1);
        }
        #debug {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">🌲 Mundo Abierto 3D | Usa el joystick para moverte</div>
    <div id="joystick-container">
        <div id="joystick"></div>
    </div>
    <div id="debug">Posición: 0, 0</div>

    <!-- Importar Three.js y sus addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        
        // --- Configuración inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Cielo azul
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); // Vista en tercera persona por ahora, pero la ajustaremos a primera persona
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Controles táctiles (joystick) ---
        const joystick = document.getElementById('joystick');
        const joystickContainer = document.getElementById('joystick-container');
        const debugDiv = document.getElementById('debug');
        
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 }; // Valores entre -1 y 1
        
        joystickContainer.addEventListener('touchstart', handleTouchStart);
        joystickContainer.addEventListener('touchmove', handleTouchMove);
        joystickContainer.addEventListener('touchend', handleTouchEnd);
        joystickContainer.addEventListener('touchcancel', handleTouchEnd);
        
        function handleTouchStart(e) {
            e.preventDefault();
            joystickActive = true;
            updateJoystick(e.touches[0]);
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if (!joystickActive) return;
            updateJoystick(e.touches[0]);
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            joystickActive = false;
            joystickVector.x = 0;
            joystickVector.y = 0;
            joystick.style.transform = 'translate(-50%, -50%)'; // reset
        }
        
        function updateJoystick(touch) {
            const rect = joystickContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let x = touch.clientX - centerX;
            let y = touch.clientY - centerY;
            
            // Limitar al radio del joystick
            const maxDist = rect.width / 2;
            const dist = Math.sqrt(x*x + y*y);
            if (dist > maxDist) {
                x = (x / dist) * maxDist;
                y = (y / dist) * maxDist;
            }
            
            // Normalizar a [-1, 1]
            joystickVector.x = x / maxDist;
            joystickVector.y = y / maxDist;
            
            // Mover la bola del joystick
            joystick.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        }

        // --- Jugador ---
        const player = {
            position: new THREE.Vector3(0, 0, 0),
            yaw: 0, // rotación en radianes
            speed: 0.2
        };
        
        // Cámara en primera persona (se actualizará en cada frame)
        camera.position.set(0, 1.8, 0); // altura de ojos
        
        // --- Iluminación ---
        // Luz ambiental
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Luz solar direccional
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.5);
        sunLight.position.set(100, 100, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        const d = 200;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 300;
        scene.add(sunLight);
        
        // Luz de relleno
        const fillLight = new THREE.PointLight(0x4466ff, 0.3);
        fillLight.position.set(-50, 50, -50);
        scene.add(fillLight);

        // --- Cielo y atmósfera (usando Sky de Three.js) ---
        const sky = new Sky();
        sky.scale.set(1000, 1000, 1000);
        scene.add(sky);
        
        const skyUniforms = sky.material.uniforms;
        skyUniforms['turbidity'].value = 10;
        skyUniforms['rayleigh'].value = 2;
        skyUniforms['mieCoefficient'].value = 0.005;
        skyUniforms['mieDirectionalG'].value = 0.8;
        skyUniforms['sunPosition'].value.set(sunLight.position.x, sunLight.position.y, sunLight.position.z);

        // --- Terreno ---
        const terrainSize = 800;
        const terrainSegments = 128;
        
        // Crear geometría de terreno con alturas procedurales
        const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
        terrainGeometry.rotateX(-Math.PI / 2); // Plano horizontal
        
        // Generar alturas usando ruido simple (combinación de senos)
        const positionAttribute = terrainGeometry.attributes.position;
        for (let i = 0; i < positionAttribute.count; i++) {
            const x = positionAttribute.getX(i);
            const z = positionAttribute.getZ(i);
            
            // Ruido simple para colinas
            let y = 0;
            y += Math.sin(x * 0.01) * Math.cos(z * 0.01) * 5;
            y += Math.sin(x * 0.02) * 2;
            y += Math.sin(z * 0.02) * 2;
            y += Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3;
            
            // Zonas más bajas para lagos
            const distToCenter = Math.sqrt(x*x + z*z);
            if (distToCenter < 100) {
                y = Math.max(y, 0); // mantener plano cerca del centro (lago)
            }
            
            positionAttribute.setY(i, y);
        }
        
        terrainGeometry.computeVertexNormals();
        
        // Textura del terreno (mezcla de hierba, tierra, arena)
        const terrainMaterial = new THREE.MeshStandardMaterial({
            color: 0x7c9d5e,
            roughness: 0.7,
            metalness: 0.1,
            emissive: 0x000000,
            flatShading: false
        });
        
        // Añadir textura de hierba (usaremos un canvas para simular)
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#3a5f0b';
        ctx.fillRect(0, 0, 512, 512);
        // Puntos aleatorios para textura
        for (let i = 0; i < 5000; i++) {
            ctx.fillStyle = `rgba(100, 150, 30, ${Math.random()*0.5})`;
            ctx.fillRect(Math.floor(Math.random()*512), Math.floor(Math.random()*512), 2, 2);
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(20, 20);
        terrainMaterial.map = texture;
        
        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.receiveShadow = true;
        terrain.castShadow = false;
        terrain.position.set(0, 0, 0);
        scene.add(terrain);

        // --- Agua (lago) ---
        const waterGeometry = new THREE.CircleGeometry(150, 64);
        const water = new Water(
            waterGeometry,
            {
                textureWidth: 512,
                textureHeight: 512,
                waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (texture) => {
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                }),
                sunDirection: sunLight.position.clone().normalize(),
                sunColor: 0xffffff,
                waterColor: 0x001e0f,
                distortionScale: 3.7,
                fog: scene.fog !== undefined
            }
        );
        water.rotation.x = -Math.PI / 2;
        water.position.set(0, 0.2, 0); // justo por encima del terreno
        water.receiveShadow = true;
        scene.add(water);

        // --- Playas (zonas de arena alrededor del lago) ---
        // Crearemos un anillo de arena alrededor del lago usando un toro o un plano circular con textura
        const beachGeometry = new THREE.RingGeometry(150, 170, 64);
        const beachMaterial = new THREE.MeshStandardMaterial({
            color: 0xeedd99,
            roughness: 0.9,
            metalness: 0.0,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.8
        });
        const beach = new THREE.Mesh(beachGeometry, beachMaterial);
        beach.rotation.x = -Math.PI / 2;
        beach.position.set(0, 0.1, 0);
        beach.receiveShadow = true;
        scene.add(beach);

        // --- Árboles (instanciados para rendimiento) ---
        const treeCount = 800;
        const treeGroup = new THREE.Group();
        
        // Crear un árbol modelo
        function createTree() {
            const group = new THREE.Group();
            
            // Tronco
            const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 2);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            // Copa (varias esferas)
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
            const leaf1 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 6), leafMat);
            leaf1.position.set(0, 2.2, 0);
            leaf1.castShadow = true;
            leaf1.receiveShadow = true;
            group.add(leaf1);
            
            const leaf2 = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6), leafMat);
            leaf2.position.set(0.5, 2.8, 0.3);
            leaf2.castShadow = true;
            leaf2.receiveShadow = true;
            group.add(leaf2);
            
            const leaf3 = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6), leafMat);
            leaf3.position.set(-0.4, 2.7, -0.4);
            leaf3.castShadow = true;
            leaf3.receiveShadow = true;
            group.add(leaf3);
            
            const leaf4 = new THREE.Mesh(new THREE.SphereGeometry(0.5, 6), leafMat);
            leaf4.position.set(0.2, 3.2, -0.2);
            leaf4.castShadow = true;
            leaf4.receiveShadow = true;
            group.add(leaf4);
            
            return group;
        }
        
        // Distribuir árboles aleatoriamente por el terreno, evitando el lago
        for (let i = 0; i < treeCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 200 + Math.random() * 300; // fuera del lago
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            // Obtener altura del terreno en esa posición (aproximada)
            const y = 0; // idealmente deberíamos leer la altura del terreno, pero por simplicidad lo ponemos a 0 y luego ajustamos con raycaster
            // Mejor usar raycaster para colocar sobre el terreno
            const tree = createTree();
            tree.position.set(x, 0, z);
            
            // Ajustar altura al terreno (podemos hacer un rayo desde arriba)
            // Para simplificar, lo dejamos a 0 y el terreno ya tiene altura, pero el árbol flotaría.
            // Solución: mover el árbol hacia arriba según la altura del terreno.
            // Usaremos un rayo para encontrar la altura.
            // Pero como es costoso, lo simulamos con la fórmula de altura del terreno.
            // Recalcular altura igual que en el terreno:
            let yPos = 0;
            yPos += Math.sin(x * 0.01) * Math.cos(z * 0.01) * 5;
            yPos += Math.sin(x * 0.02) * 2;
            yPos += Math.sin(z * 0.02) * 2;
            yPos += Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3;
            tree.position.y = yPos;
            
            tree.castShadow = true;
            tree.receiveShadow = true;
            scene.add(tree);
        }

        // --- Rocas y detalles (opcional) ---
        // Añadir algunas piedras
        const rockGeo = new THREE.DodecahedronGeometry(0.8);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
        for (let i = 0; i < 100; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 180 + Math.random() * 200;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            let yPos = 0;
            yPos += Math.sin(x * 0.01) * Math.cos(z * 0.01) * 5;
            yPos += Math.sin(x * 0.02) * 2;
            yPos += Math.sin(z * 0.02) * 2;
            yPos += Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3;
            
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(x, yPos, z);
            rock.scale.set(1 + Math.random()*0.5, 1 + Math.random()*0.5, 1 + Math.random()*0.5);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        // --- Nubes (partículas) ---
        const cloudGeo = new THREE.BufferGeometry();
        const cloudCount = 200;
        const cloudPositions = new Float32Array(cloudCount * 3);
        for (let i = 0; i < cloudCount; i++) {
            cloudPositions[i*3] = (Math.random() - 0.5) * 800;
            cloudPositions[i*3+1] = 50 + Math.random() * 50;
            cloudPositions[i*3+2] = (Math.random() - 0.5) * 800;
        }
        cloudGeo.setAttribute('position', new THREE.BufferAttribute(cloudPositions, 3));
        const cloudMat = new THREE.PointsMaterial({ color: 0xffffff, size: 15, transparent: true, opacity: 0.4 });
        const clouds = new THREE.Points(cloudGeo, cloudMat);
        scene.add(clouds);

        // --- Movimiento del jugador ---
        function updatePlayer() {
            // El joystick da valores en x (horizontal) y y (vertical)
            // Interpretamos: x controla rotación (yaw), y controla movimiento adelante/atrás
            const turnSpeed = 0.03;
            const moveSpeed = player.speed;
            
            // Rotación
            player.yaw -= joystickVector.x * turnSpeed; // negativo para que izquierda gire a izquierda
            
            // Movimiento en dirección de la cámara
            if (Math.abs(joystickVector.y) > 0.1) {
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle('y', player.yaw);
                player.position.addScaledVector(forward, joystickVector.y * moveSpeed);
            }
            
            // Limitar al tamaño del terreno (opcional)
            const limit = 350;
            player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
            player.position.z = Math.max(-limit, Math.min(limit, player.position.z));
            
            // Actualizar posición de la cámara (primera persona)
            camera.position.copy(player.position.clone().add(new THREE.Vector3(0, 1.8, 0)));
            camera.rotation.y = player.yaw;
            
            // Mostrar posición en debug
            debugDiv.innerHTML = `Pos: ${player.position.x.toFixed(1)}, ${player.position.z.toFixed(1)} | Yaw: ${(player.yaw * 180 / Math.PI).toFixed(0)}°`;
        }

        // --- Animación ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Actualizar movimiento según joystick
            updatePlayer();
            
            // Animar agua
            water.material.uniforms['time'].value += 0.01;
            
            // Mover nubes lentamente
            clouds.rotation.y += 0.0001;
            
            renderer.render(scene, camera);
        }
        
        animate();

        // --- Ajuste de tamaño de ventana ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Mundo 3D iniciado');
    </script>
</body>
</html>
